<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Webcam Publisher</title>
	</head>
	<body>
		<h1>Webcam Publisher</h1>
		<p id="status">Idle</p>
		<video id="preview" autoplay muted playsinline width="320" height="240"></video>
		<br />
		<br />
		<button id="start" type="button">Start</button>
		<button id="stop" type="button">Stop</button>
		<button id="pip" type="button">Enter PiP</button>
		<canvas id="capture" hidden></canvas>

		<script>
			const statusEl = document.getElementById("status");
			const startBtn = document.getElementById("start");
			const stopBtn = document.getElementById("stop");
			const pipBtn = document.getElementById("pip");
			const video = document.getElementById("preview");
			const canvas = document.getElementById("capture");
			const ctx = canvas.getContext("2d");

			const WIDTH = 320;
			const HEIGHT = 240;
			const FPS = 24;
			const JPEG_QUALITY = 0.6;
			const PIP_SUPPORTED = document.pictureInPictureEnabled && typeof video.requestPictureInPicture === "function";

			let stream = null;
			let socket = null;
			let frameTimer = null;
			let statsTimer = null;
			let frameInFlight = false;
			let statusText = "Idle";
			let cameraText = "unknown";
			let retryPip = false;
			let sentFrames = 0;
			let sentBytes = 0;
			let totalEncodeMs = 0;

			function socketOpen() {
				return socket && socket.readyState === WebSocket.OPEN;
			}

			function resetStats() {
				sentFrames = 0;
				sentBytes = 0;
				totalEncodeMs = 0;
			}

			function clearTimers() {
				if (frameTimer !== null) {
					clearInterval(frameTimer);
					frameTimer = null;
				}
				if (statsTimer !== null) {
					clearInterval(statsTimer);
					statsTimer = null;
				}
			}

			function render() {
				const pipActive = document.pictureInPictureElement === video;
				const pipSuffix = PIP_SUPPORTED ? ` | ${pipActive ? "PiP on" : "PiP off"}` : "";
				statusEl.textContent = `${statusText}${pipSuffix}`;

				if (!PIP_SUPPORTED) {
					pipBtn.disabled = true;
					pipBtn.textContent = "PiP Unavailable";
					return;
				}

				pipBtn.disabled = !stream || !video.videoWidth;
				pipBtn.textContent = pipActive ? "PiP Active" : retryPip ? "Retry PiP" : "Enter PiP";
			}

			function setStatus(message) {
				statusText = message;
				render();
			}

			function socketUrl(path) {
				const protocol = window.location.protocol === "https:" ? "wss" : "ws";
				return `${protocol}://${window.location.host}${path}`;
			}

			function updateCameraText() {
				const [track] = stream?.getVideoTracks() ?? [];
				if (!track) {
					cameraText = "unknown";
					return;
				}

				const settings = track.getSettings();
				cameraText = `${settings.width ?? "?"}x${settings.height ?? "?"}@${Math.round(settings.frameRate ?? 0) || "?"}fps`;
			}

			function updateStreamingStatus() {
				if (!socketOpen()) {
					return;
				}
				if (sentFrames === 0) {
					setStatus(`Connected. Waiting frames... camera ${cameraText}`);
					return;
				}

				const avgEncodeMs = totalEncodeMs / sentFrames;
				const avgKbPerFrame = sentBytes / sentFrames / 1024;
				setStatus(
					`Streaming ${sentFrames} FPS | encode ${avgEncodeMs.toFixed(1)}ms | ${avgKbPerFrame.toFixed(1)}KB/frame | camera ${cameraText} -> ${WIDTH}x${HEIGHT}`,
				);
				resetStats();
			}

			function sendFrame() {
				if (!stream || !socketOpen() || frameInFlight || !video.videoWidth || !video.videoHeight) {
					return;
				}

				frameInFlight = true;
				const encodeStartMs = performance.now();
				ctx.drawImage(video, 0, 0, WIDTH, HEIGHT);

				canvas.toBlob(
					(blob) => {
						if (!blob || !socketOpen()) {
							frameInFlight = false;
							return;
						}

						try {
							socket.send(blob);
							sentFrames += 1;
							sentBytes += blob.size;
							totalEncodeMs += performance.now() - encodeStartMs;
						} catch (error) {
							setStatus(`Frame send failed: ${error instanceof Error ? error.message : String(error)}`);
						}

						frameInFlight = false;
					},
					"image/jpeg",
					JPEG_QUALITY,
				);
			}

			function connectSocket() {
				socket = new WebSocket(socketUrl("/esp32-stream"));
				socket.addEventListener("open", () => {
					setStatus("Connected. Starting stream...");
					resetStats();
					frameTimer = window.setInterval(sendFrame, Math.floor(1000 / FPS));
					statsTimer = window.setInterval(updateStreamingStatus, 1000);
				});
				socket.addEventListener("close", () => {
					clearTimers();
					socket = null;
					setStatus("Socket closed");
				});
				socket.addEventListener("error", () => {
					setStatus("Socket error");
				});
			}

			async function requestPiP(auto = false) {
				if (!PIP_SUPPORTED) {
					setStatus("Picture-in-Picture is not supported in this browser");
					return;
				}
				if (!stream) {
					setStatus("Start the webcam before entering Picture-in-Picture");
					return;
				}
				if (document.pictureInPictureElement === video) {
					render();
					return;
				}
				if (!video.videoWidth || !video.videoHeight) {
					await new Promise((resolve) => video.addEventListener("loadedmetadata", resolve, { once: true }));
				}

				try {
					await video.requestPictureInPicture();
					retryPip = false;
					render();
				} catch (error) {
					retryPip = auto;
					render();
					const message = error instanceof Error ? error.message : String(error);
					setStatus(
						auto ? `Auto PiP was blocked. Click ${pipBtn.textContent} to retry (${message})` : `PiP failed: ${message}`,
					);
				}
			}

			async function startStream() {
				if (stream) {
					setStatus("Already running");
					return;
				}

				try {
					setStatus("Requesting webcam permission...");
					stream = await navigator.mediaDevices.getUserMedia({
						video: {
							width: { ideal: WIDTH, max: WIDTH },
							height: { ideal: HEIGHT, max: HEIGHT },
							frameRate: { ideal: FPS, max: FPS },
						},
						audio: false,
					});
					video.srcObject = stream;
					await video.play();
					canvas.width = WIDTH;
					canvas.height = HEIGHT;
					updateCameraText();
					render();
					await requestPiP(true);
					connectSocket();
				} catch (error) {
					setStatus(`Start failed: ${error instanceof Error ? error.message : String(error)}`);
					await stopStream();
				}
			}

			async function stopStream() {
				clearTimers();
				if (socket) {
					socket.close();
					socket = null;
				}
				if (document.pictureInPictureElement === video) {
					try {
						await document.exitPictureInPicture();
					} catch {}
				}
				if (stream) {
					stream.getTracks().forEach((track) => track.stop());
					stream = null;
				}

				video.srcObject = null;
				frameInFlight = false;
				cameraText = "unknown";
				retryPip = false;
				resetStats();
				setStatus("Stopped");
			}

			startBtn.addEventListener("click", () => void startStream());
			stopBtn.addEventListener("click", () => void stopStream());
			pipBtn.addEventListener("click", () => void requestPiP());
			video.addEventListener("enterpictureinpicture", render);
			video.addEventListener("leavepictureinpicture", () => {
				retryPip = false;
				render();
			});
			window.addEventListener("beforeunload", () => void stopStream());
			render();
		</script>
	</body>
</html>
