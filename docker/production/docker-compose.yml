name: pakamew-prod

include:
  - ../docker-compose.app.yml

services:
  app-server:
    build:
      context: ../..
      dockerfile: docker/images/app-server.Dockerfile
    image: ${APP_SERVER_IMAGE}
    pull_policy: build
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      alloy:
        condition: service_started
    env_file:
      - path: ../../packages/app-server/.env
        required: true
    environment:
      HOST: ${APP_SERVER_HOST}
      PORT: ${APP_SERVER_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${APP_SERVER_DATABASE_HOST}:${APP_SERVER_DATABASE_PORT}/${POSTGRES_DB}?schema=${APP_SERVER_DATABASE_SCHEMA}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://${APP_SERVER_OTEL_HOST}:${APP_SERVER_OTEL_PORT}
      OTEL_DEPLOYMENT_ENVIRONMENT: ${APP_SERVER_OTEL_DEPLOYMENT_ENVIRONMENT}
    expose:
      - "${APP_SERVER_PORT}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:${APP_SERVER_PORT}/api/health').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    labels:
      traefik.enable: "true"
      traefik.docker.network: pakamew-prod-edge
      traefik.http.routers.app-server.entrypoints: web
      traefik.http.routers.app-server.rule: Host(`${APP_SERVER_PUBLIC_HOST}`)
      traefik.http.routers.app-server.service: app-server
      traefik.http.routers.app-server-tls.entrypoints: websecure
      traefik.http.routers.app-server-tls.rule: Host(`${APP_SERVER_PUBLIC_HOST}`)
      traefik.http.routers.app-server-tls.tls: "true"
      traefik.http.routers.app-server-tls.service: app-server
      traefik.http.services.app-server.loadbalancer.server.port: "${APP_SERVER_PORT}"
    networks:
      - default
      - edge

  livestream-node:
    build:
      context: ../..
      dockerfile: docker/images/livestream-node.Dockerfile
    image: ${LIVESTREAM_NODE_IMAGE}
    pull_policy: build
    restart: unless-stopped
    depends_on:
      ovenmediaengine:
        condition: service_started
    env_file:
      - path: ../../packages/livestream-node/.env
        required: true
    environment:
      PORT: ${LIVESTREAM_NODE_PORT}
      LIVESTREAM_NODE_SCRIPT: ${LIVESTREAM_NODE_SCRIPT}
      OME_RTMP_URL: rtmp://${OME_RTMP_HOST}:${OME_RTMP_PORT}/${OME_RTMP_APPLICATION}/${OME_RTMP_STREAM_KEY}
    expose:
      - "${LIVESTREAM_NODE_PORT}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:${LIVESTREAM_NODE_PORT}/health').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    labels:
      traefik.enable: "true"
      traefik.docker.network: pakamew-prod-edge
      traefik.http.routers.livestream-node.entrypoints: web
      traefik.http.routers.livestream-node.rule: Host(`${LIVESTREAM_NODE_PUBLIC_HOST}`)
      traefik.http.routers.livestream-node.service: livestream-node
      traefik.http.routers.livestream-node-tls.entrypoints: websecure
      traefik.http.routers.livestream-node-tls.rule: Host(`${LIVESTREAM_NODE_PUBLIC_HOST}`)
      traefik.http.routers.livestream-node-tls.tls: "true"
      traefik.http.routers.livestream-node-tls.service: livestream-node
      traefik.http.services.livestream-node.loadbalancer.server.port: "${LIVESTREAM_NODE_PORT}"
    networks:
      - default
      - edge

  traefik:
    image: ${TRAEFIK_IMAGE}
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "${TRAEFIK_HTTP_BIND_IP}:${TRAEFIK_HTTP_PORT}:80"
      - "${TRAEFIK_HTTPS_BIND_IP}:${TRAEFIK_HTTPS_PORT}:443"
      - "${TRAEFIK_DASHBOARD_BIND_IP}:${TRAEFIK_DASHBOARD_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - edge

  ovenmediaengine:
    image: airensoft/ovenmediaengine:v0.20.0
    restart: unless-stopped
    environment:
      OME_HOST_IP: ${OME_HOST_IP:-127.0.0.1}
      OME_CORS_ALLOWED_ORIGIN: ${OME_CORS_ALLOWED_ORIGIN:-*}
    ports:
      - "${OME_RTMP_BIND_IP:-0.0.0.0}:${OME_RTMP_HOST_PORT:-1935}:1935"
      - "${OME_SRT_BIND_IP:-0.0.0.0}:${OME_SRT_HOST_PORT:-9999}:9999/udp"
      - "${OME_OVT_BIND_IP:-0.0.0.0}:${OME_OVT_HOST_PORT:-9000}:9000"
      - "${OME_SIGNAL_BIND_IP:-127.0.0.1}:${OME_SIGNAL_HOST_PORT:-3333}:3333"
      - "${OME_TURN_BIND_IP:-0.0.0.0}:${OME_TURN_HOST_PORT:-3478}:3478"
      - "${OME_ICE_BIND_IP:-0.0.0.0}:${OME_ICE_HOST_START_PORT:-10000}-${OME_ICE_HOST_END_PORT:-10009}:10000-10009/udp"
    expose:
      - "3333"
    volumes:
      - ../ovenmediaengine/Server.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml:ro
      - pakamew-ome-edge-conf:/opt/ovenmediaengine/bin/edge_conf
    labels:
      traefik.enable: "true"
      traefik.docker.network: pakamew-prod-edge
      traefik.http.routers.ovenmediaengine.entrypoints: web
      traefik.http.routers.ovenmediaengine.rule: Host(`${OME_PUBLIC_HOST}`)
      traefik.http.routers.ovenmediaengine.service: ovenmediaengine
      traefik.http.routers.ovenmediaengine-tls.entrypoints: websecure
      traefik.http.routers.ovenmediaengine-tls.rule: Host(`${OME_PUBLIC_HOST}`)
      traefik.http.routers.ovenmediaengine-tls.tls: "true"
      traefik.http.routers.ovenmediaengine-tls.service: ovenmediaengine
      traefik.http.services.ovenmediaengine.loadbalancer.server.port: "3333"
    networks:
      - default
      - edge

  alloy:
    image: ${GRAFANA_ALLOY_IMAGE}
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: true
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    expose:
      - "${APP_SERVER_OTEL_GRPC_PORT}"
      - "${APP_SERVER_OTEL_PORT}"
    ports:
      - "${ALLOY_BIND_IP}:${ALLOY_HTTP_PORT}:12345"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/alloy:/etc/alloy:ro
      - alloy-data:/var/lib/alloy/data
    networks:
      - default
      - edge

networks:
  edge:
    name: pakamew-prod-edge

volumes:
  alloy-data:
  pakamew-ome-edge-conf:
