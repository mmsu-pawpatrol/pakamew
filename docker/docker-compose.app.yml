name: pakamew

services:
  postgres:
    image: postgres:17.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pakamew}
      POSTGRES_USER: ${POSTGRES_USER:-pakamew}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pakamew}
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432" # PostgreSQL database
    volumes:
      - pakamew-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pakamew -d pakamew"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  pakamew-postgres-data:
